<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Writing Time Logger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2a2a2a;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid #3a3a3a;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .status {
            padding: 0.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .status.connected {
            color: #4CAF50;
        }

        .status.error {
            color: #f44336;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 1rem;
        }

        .config {
            background: #2a2a2a;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .config h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #aaa;
        }

        .config-field {
            margin-bottom: 1rem;
        }

        .config-field label {
            display: block;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }

        .config-field input {
            width: 100%;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            color: #ffffff;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-start {
            background: #4CAF50;
            color: white;
        }

        .btn-start:active {
            background: #45a049;
        }

        .btn-done {
            background: #2196F3;
            color: white;
        }

        .btn-done:active {
            background: #0b7dda;
        }

        .btn-connect {
            background: #0061FF;
            color: white;
            padding: 1rem;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        .btn-disconnect {
            background: #666;
            color: white;
            padding: 0.75rem;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .btn-settings-toggle {
            background: transparent;
            border: 1px solid #3a3a3a;
            color: #888;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-transform: none;
            letter-spacing: normal;
        }

        .btn-settings-toggle:active {
            background: #2a2a2a;
        }

        .settings-collapsible {
            margin-bottom: 1rem;
        }

        .settings-collapsible.collapsed {
            display: none;
        }

        .recent-log {
            background: #2a2a2a;
            padding: 1rem;
            border-radius: 8px;
            margin-top: auto;
            font-size: 0.85rem;
            color: #888;
            max-height: 200px;
            overflow-y: auto;
        }

        .recent-log pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .hidden {
            display: none;
        }

        .notes-field {
            margin: 1rem 0;
        }

        .notes-field input {
            width: 100%;
            padding: 0.75rem;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            color: #ffffff;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⏱️ Writing Time Logger</h1>
    </div>

    <div class="status" id="status">Not connected</div>

    <div class="main">
        <div class="config" id="configPanel">
            <h2>Connect to Dropbox</h2>
            <div class="config-field">
                <label>Dropbox Folder Path</label>
                <input type="text" id="folderPath" placeholder="/timelogs" value="/timelogs">
            </div>
            <button class="btn-connect" id="connectBtn">Connect to Dropbox</button>
        </div>

        <div id="loggerPanel" class="hidden">
            <button class="btn-settings-toggle" id="settingsToggle">⚙️ Settings</button>
            
            <div class="config settings-collapsible collapsed" id="settingsPanel">
                <h2>Settings</h2>
                <div class="config-field">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="rkolewe">
                </div>
                <div class="config-field">
                    <label>Hostname</label>
                    <input type="text" id="hostname" placeholder="workroom">
                </div>
                <div class="config-field">
                    <label>Dropbox Folder Path</label>
                    <input type="text" id="folderPathLogger" placeholder="/timelogs">
                </div>
                <button class="btn-disconnect" id="disconnectBtn">Disconnect from Dropbox</button>
            </div>

            <div class="notes-field">
                <input type="text" id="notes" placeholder="Optional notes (e.g., §63)">
            </div>

            <button class="btn-start" id="startBtn">
                ▶️ Start Writing
            </button>

            <button class="btn-done" id="doneBtn">
                ✓ Done
            </button>

            <div class="recent-log" id="recentLog">
                <strong>Recent entries will appear here...</strong>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
    <script>
        // Dropbox App Key - you'll need to create a Dropbox app and use your own key
        const DROPBOX_APP_KEY = 'evyhtrp9879xmbe';
        
        let dbx = null;
        let config = {
            username: '',
            hostname: '',
            folderPath: '/timelogs'
        };

        // Load saved config
        function loadConfig() {
            const saved = localStorage.getItem('timelogConfig');
            if (saved) {
                config = JSON.parse(saved);
                document.getElementById('username').value = config.username;
                document.getElementById('hostname').value = config.hostname;
                document.getElementById('folderPath').value = config.folderPath;
                // Also update the logger panel folder path field if it exists
                const loggerFolderPath = document.getElementById('folderPathLogger');
                if (loggerFolderPath) {
                    loggerFolderPath.value = config.folderPath;
                }
            }
        }

        // Save config
        function saveConfig() {
            config.username = document.getElementById('username').value;
            config.hostname = document.getElementById('hostname').value;
            
            // Get folder path from whichever field is visible
            const folderPath = document.getElementById('folderPath').value;
            const folderPathLogger = document.getElementById('folderPathLogger');
            if (folderPathLogger && folderPathLogger.value) {
                config.folderPath = folderPathLogger.value;
            } else {
                config.folderPath = folderPath;
            }
            
            localStorage.setItem('timelogConfig', JSON.stringify(config));
        }

        // Format current timestamp
        function getTimestamp() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // Get today's filename
        function getTodayFilename() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `--${year}${month}${day}.txt`;
        }

        // Get file path
        function getFilePath() {
            const folder = config.folderPath.replace(/\/$/, ''); // Remove trailing slash
            return `${folder}/${getTodayFilename()}`;
        }

        // Create log entry
        function createLogEntry(activity, notes = '') {
            const timestamp = getTimestamp();
            let entry = `${timestamp} ${config.username} on ${config.hostname} @journal  @${activity}\n`;
            if (notes) {
                entry += `${notes}\n`;
            }
            entry += ' \n'; // Empty line separator
            return entry;
        }

        // Write entry to Dropbox
        async function writeEntry(activity) {
            if (!dbx) {
                setStatus('Not connected to Dropbox', 'error');
                return;
            }

            saveConfig();

            if (!config.username || !config.hostname) {
                setStatus('Please enter username and hostname in Settings above', 'error');
                return;
            }

            if (!config.folderPath) {
                setStatus('Please enter Dropbox folder path', 'error');
                return;
            }

            try {
                setStatus('Writing to Dropbox...', '');
                
                const notes = document.getElementById('notes').value;
                const newEntry = createLogEntry(activity, notes);
                const filePath = getFilePath();

                // Try to read existing file
                let existingContent = '';
                try {
                    const response = await dbx.filesDownload({ path: filePath });
                    const blob = response.result.fileBlob;
                    existingContent = await blob.text();
                } catch (e) {
                    // File doesn't exist yet, that's okay
                    console.log('Creating new file:', filePath);
                }

                // Prepend new entry (reverse chronological)
                const newContent = newEntry + existingContent;

                // Write back to Dropbox
                await dbx.filesUpload({
                    path: filePath,
                    contents: newContent,
                    mode: 'overwrite'
                });

                setStatus(`✓ Logged @${activity}`, 'connected');
                document.getElementById('notes').value = ''; // Clear notes
                updateRecentLog(newEntry);

            } catch (error) {
                console.error('Error writing to Dropbox:', error);
                setStatus(`Error: ${error.message}`, 'error');
            }
        }

        // Update recent log display
        function updateRecentLog(entry) {
            const logDiv = document.getElementById('recentLog');
            const pre = document.createElement('pre');
            pre.textContent = entry;
            logDiv.innerHTML = '';
            logDiv.appendChild(pre);
        }

        // Set status message
        function setStatus(message, type = '') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }

        // Toggle settings panel
        function toggleSettings() {
            const settingsPanel = document.getElementById('settingsPanel');
            settingsPanel.classList.toggle('collapsed');
        }

        // Connect to Dropbox
        function connectDropbox() {
            // Save folder path before connecting
            saveConfig();
            
            const redirectUri = window.location.origin + window.location.pathname;
            const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(redirectUri)}`;
            window.location.href = authUrl;
        }

        // Disconnect from Dropbox
        function disconnect() {
            localStorage.removeItem('dropboxAccessToken');
            dbx = null;
            document.getElementById('configPanel').classList.remove('hidden');
            document.getElementById('loggerPanel').classList.add('hidden');
            setStatus('Disconnected', '');
        }

        // Initialize
        function init() {
            loadConfig();

            // Check for access token in URL (OAuth callback)
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (accessToken) {
                localStorage.setItem('dropboxAccessToken', accessToken);
                // Clean up URL
                window.location.hash = '';
            }

            // Check for saved token
            const savedToken = localStorage.getItem('dropboxAccessToken');
            if (savedToken) {
                dbx = new Dropbox.Dropbox({ accessToken: savedToken });
                
                // Copy folder path to logger panel
                const folderPath = document.getElementById('folderPath').value;
                document.getElementById('folderPathLogger').value = folderPath;
                
                document.getElementById('configPanel').classList.add('hidden');
                document.getElementById('loggerPanel').classList.remove('hidden');
                
                // Show settings panel if username/hostname not set (first time)
                if (!config.username || !config.hostname) {
                    document.getElementById('settingsPanel').classList.remove('collapsed');
                    setStatus('Please enter username and hostname in Settings', 'error');
                } else {
                    setStatus('Connected to Dropbox', 'connected');
                }
            }

            // Event listeners
            document.getElementById('connectBtn').addEventListener('click', connectDropbox);
            document.getElementById('disconnectBtn').addEventListener('click', disconnect);
            document.getElementById('settingsToggle').addEventListener('click', toggleSettings);
            document.getElementById('startBtn').addEventListener('click', () => writeEntry('writing'));
            document.getElementById('doneBtn').addEventListener('click', () => writeEntry('done'));
        }

        init();
    </script>
</body>
</html>
